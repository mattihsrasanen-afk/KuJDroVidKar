<!DOCTYPE html>
<html lang="fi">
<head>    <title>Kuvat ja Videot Kartalla - By MattiHSRasanenAFK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #222; color: white; }
        header { padding: 10px 20px; background: #333; display: flex; align-items: center; justify-content: space-between; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; z-index: 1; }
        
        #side-panel { width: 350px; background: #1a1a1a; display: none; flex-direction: column; padding: 15px; border-left: 2px solid #444; z-index: 2; }
        #distance-info { background: #444; padding: 8px; margin-bottom: 10px; border-radius: 4px; font-weight: bold; color: #4aa3ff; border: 1px solid #555; font-size: 0.9em; font-family: monospace; }
        video { width: 100%; border-radius: 5px; background: black; }
        
        .file-list { height: 250px; overflow-y: auto; background: #111; padding: 10px; border-top: 1px solid #444; }
        .folder-title { background: #333; padding: 5px; margin-top: 10px; font-weight: bold; font-size: 0.9em; border-left: 3px solid #4aa3ff; }
        .file-link { display: block; color: #4aa3ff; text-decoration: none; padding: 4px 10px; font-size: 0.85em; cursor: pointer; border-bottom: 1px solid #222; }
        .file-link:hover { background: #2a2a2a; }
        
        .map-controls { position: absolute; top: 10px; left: 60px; z-index: 1000; background: rgba(30, 30, 30, 0.8); padding: 5px; border-radius: 5px; border: 1px solid #444; }
        .map-controls button { background: #4aa3ff; color: #111; border: none; padding: 5px 10px; margin: 0 5px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        
        .moving-arrow { transition: all 0.2s linear; }

        /* Popup ja Galleria tyylit (Tuotu Metsäkartasta) */
        .img-popup { text-align: center; color: white; width: 100%; }
        .img-popup img { max-width: 100%; border-radius: 4px; margin-top: 5px; cursor: pointer; }
        .leaflet-popup-content-wrapper { background: #333; color: white; }
        .leaflet-popup-content { margin: 10px; width: 250px !important; }

        #image-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; flex-direction: column;
        }
        #full-image { max-width: 90%; max-height: 80%; border: 3px solid white; border-radius: 8px; object-fit: contain; }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); color: white; border: none;
            padding: 20px 15px; cursor: pointer; font-size: 30px; border-radius: 5px; transition: background 0.3s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.4); }
        #prev-btn { left: 20px; }
        #next-btn { right: 20px; }
        #image-counter { color: #aaa; margin-top: 5px; font-size: 0.9em; }
       /* Nuolen ulkokuori */
.drone-wrapper {
    width: 30px;
    height: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Itse nuoli (yksinkertainen kolmio) */
.drone-arrow {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 20px solid #ffcc00; /* Keltainen nuoli */
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
    transform-origin: center center;
    display: inline-block;
}
    </style>
</head>
<body>
<header>
    <span>🏠 Mediakirjasto</span>
    <h2 style="margin:0;">Kuvat ja Videot</h2>
    <div>
        <a href="https://paypal.me/MattiHSRasanenAFK" target="_blank" style="color: #ffcc00; text-decoration: none; font-weight: bold; margin-right: 15px;">💰 Lahjoita koodaajalle</a>
    </div>
</header>

<div id="main-container">
    <div id="map"></div>
    <div class="map-controls">
        <button onclick="toggleAllLayers(true)">Valitse kaikki vuodet</button>
        <button onclick="toggleAllLayers(false)">Tyhjennä valinnat</button>
    </div>
    <div id="side-panel">
        <button onclick="closeVideo()" style="float:right; cursor:pointer;"> Sulje </button>
        <h4 id="media-title" style="margin-top:0;">Tiedosto</h4>
        <div id="distance-info">Matka: 0.00 / 0.00 km</div>
        <video id="player" controls autoplay></video>
    </div>
</div>

<div class="file-list" id="file-list"></div>

<div id="image-panel">
    <span style="position:absolute; top:20px; right:30px; cursor:pointer; color:white; font-size:40px; z-index: 3100;" onclick="suljeKuva()">×</span>
    <button id="prev-btn" class="nav-btn" onclick="vaihdaKuva(-1)">❮</button>
    <img id="full-image" src="">
    <button id="next-btn" class="nav-btn" onclick="vaihdaKuva(1)">❯</button>
    <h3 id="image-caption" style="color:white; margin-top:15px; margin-bottom: 5px;"></h3>
    <div id="image-counter"></div>
</div>
<footer>
    <p>
        &copy; 2026 Matti Räsänen | 
        Lisensoitu <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank">GPLv3:n</a> mukaisesti. | 
        Kartta-aineisto: <a href="https://www.maanmittauslaitos.fi/" target="_blank">Maanmittauslaitos</a> (CC BY 4.0) |
        <a href="https://paypal.me/MattiHSRasanenAFK" target="_blank" style="color: #4aa3ff;">💰 Tue kehitystä lahjoittamalla</a>
    </p>
</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. ALUSTUS
    var map = L.map('map').setView([62.0, 25.0], 6);
    var groups = {}; 
    var nykyinenReitti = [];
    var viimeisinKulma = 0;
    var nykyinenGalleria = [];
    var nykyinenIndeksi = 0;
    var mml_key = '{{ mml_key }}'; 

    // 2. DRONE-IKONI
    var droneIcon = L.divIcon({
        html: '<div class="drone-wrapper"><div class="drone-arrow"></div></div>',
        className: 'moving-arrow',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });
    var currentDroneMarker = L.marker([0, 0], { icon: droneIcon });

    // 3. KARTTAPOHJAT (OSM, Esri, MML)
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    var worldSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    var ilmakuva = L.tileLayer('https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/ortokuva/default/WGS84_Pseudo-Mercator/{z}/{y}/{x}.png?api-key=' + mml_key);
    var maastokartta = L.tileLayer('https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/maastokartta/default/WGS84_Pseudo-Mercator/{z}/{y}/{x}.png?api-key=' + mml_key);
    var kiinteistorajat = L.tileLayer('https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/kiinteistojaotus/default/WGS84_Pseudo-Mercator/{z}/{y}/{x}.png?api-key=' + mml_key, { transparent: true, format: 'image/png' });

    var baseMaps = { "OSM": osm, "Satelliitti": worldSatellite, "Ilmakuva": ilmakuva, "Maastokartta": maastokartta };
    var overlayMaps = { "Kiinteistörajat": kiinteistorajat };
    var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

    // 4. DATAN LATAUS
    fetch('/api/data')
        .then(res => res.json())
        .then(data => {
            const listDiv = document.getElementById('file-list');
            const folders = {};
            const kuvatSijainneittain = {};
            window.kaikkiKuvaRyhmat = {};

            data.forEach(item => {
                let vuosi = item.path.match(/(19|20)\d{2}/)?.[0] || "Muut";
                item.vuosi = vuosi;

                if (!groups[vuosi]) {
                    groups[vuosi] = { videot: L.layerGroup().addTo(map), kuvat: L.layerGroup().addTo(map) }; 
                    layerControl.addOverlay(groups[vuosi].videot, "🎬 Videot " + vuosi);
                    layerControl.addOverlay(groups[vuosi].kuvat, "📷 Kuvat " + vuosi);
                }
                
                if (item.type === 'video' && item.route && item.route.length > 0) {
                    L.polyline(item.route.map(p => [p.lat, p.lng]), { color: 'cyan', weight: 3, opacity: 0.6 })
                     .addTo(groups[vuosi].videot)
                     .on('click', () => playVideo(item));
                }
                
                if (item.type === 'image' && item.lat && item.lng) {
                    let locKey = vuosi + "_" + item.lat.toFixed(5) + "_" + item.lng.toFixed(5);
                    if (!kuvatSijainneittain[locKey]) kuvatSijainneittain[locKey] = [];
                    kuvatSijainneittain[locKey].push(item);
                    window.kaikkiKuvaRyhmat[locKey] = kuvatSijainneittain[locKey];
                }

                let folderName = item.path.split('/')[1] || "Juuri";
                if (!folders[folderName]) folders[folderName] = [];
                folders[folderName].push(item);
            });

            // Piirretään kuvapisteet
            Object.keys(kuvatSijainneittain).forEach(locKey => {
                let kuvat = kuvatSijainneittain[locKey];
                let base = kuvat[0];
                let popupHtml = `<div class="img-popup">`;
                kuvat.forEach((k, idx) => {
                    popupHtml += `<div>${k.name}<br><img src="/media/${k.path}" onclick="avaaGalleria(window.kaikkiKuvaRyhmat['${locKey}'], ${idx})"></div>`;
                });
                popupHtml += `</div>`;

                L.circleMarker([base.lat, base.lng], {
                    radius: kuvat.length > 1 ? 10 : 8,
                    fillColor: kuvat.length > 1 ? "#e67e22" : "#ff4400",
                    color: "#fff", weight: 2, fillOpacity: 0.9
                }).addTo(groups[base.vuosi].kuvat).bindPopup(popupHtml);
            });

            // Sivulistan rakennus
            Object.keys(folders).sort().reverse().forEach(f => {
                let div = document.createElement('div');
                div.className = 'folder-title'; div.innerText = "📁 " + f;
                listDiv.appendChild(div);
                folders[f].forEach(file => {
                    let a = document.createElement('a');
                    a.className = 'file-link';
                    a.innerText = (file.type === 'video' ? "🎬 " : "📷 ") + file.name;
                    a.onclick = () => {
                        if (file.type === 'video') playVideo(file);
                        else avaaGalleria([file], 0);
                    };
                    listDiv.appendChild(a);
                });
            });
        });

    // 5. TOIMINNOT
    function playVideo(item) {
        document.getElementById('side-panel').style.display = 'flex';
        const player = document.getElementById('player');
        document.getElementById('media-title').innerText = item.name;
        
        // Esilasketaan matka videon reitille
        if (item.route) {
            laskeGpsMatkat(item.route);
            nykyinenReitti = item.route;
            currentDroneMarker.setLatLng([nykyinenReitti[0].lat, nykyinenReitti[0].lng]).addTo(map);
        }

        player.src = "/media/" + item.path;
        player.play();
    }

    function closeVideo() {
        document.getElementById('player').pause();
        document.getElementById('side-panel').style.display = 'none';
        if (map.hasLayer(currentDroneMarker)) map.removeLayer(currentDroneMarker);
    }

    // 6. VIDEON JA DRONEN SEURANTA
    document.getElementById('player').addEventListener('timeupdate', function() {
        if (!nykyinenReitti || nykyinenReitti.length < 2) return;
        
        const currentTime = this.currentTime;
        let p1, p2;

        // Etsitään nykyinen pätkä reitistä
        for (let i = 0; i < nykyinenReitti.length - 1; i++) {
            if (currentTime >= nykyinenReitti[i].t && currentTime <= nykyinenReitti[i+1].t) {
                p1 = nykyinenReitti[i]; 
                p2 = nykyinenReitti[i+1]; 
                break;
            }
        }

        if (p1 && p2) {
            let pct = (currentTime - p1.t) / (p2.t - p1.t);
            let lat = p1.lat + (p2.lat - p1.lat) * pct;
            let lng = p1.lng + (p2.lng - p1.lng) * pct;
            
            // Päivitetään dronekartalle
            currentDroneMarker.setLatLng([lat, lng]);

            // Lasketaan kulma (suunta)
            let uusiKulma = (Math.atan2(p2.lat - p1.lat, p2.lng - p1.lng) * 180 / Math.PI);
            let viimeisinKulma = 90 - uusiKulma; 

            const arrow = currentDroneMarker.getElement()?.querySelector('.drone-arrow');
            if (arrow) arrow.style.transform = `rotate(${viimeisinKulma}deg)`;

            // --- MATKA JA AIKA ---
            // Interpoloidaan matka p1 ja p2 välillä tarkan tuloksen saamiseksi
            let matkaAlusta = p1.kumulatiivinenMatka + ( (p2.kumulatiivinenMatka - p1.kumulatiivinenMatka) * pct );
            let km = (matkaAlusta / 1000).toFixed(2);
            
            let naytaAika = kelloMuotoon(Math.floor(currentTime)) + " / " + kelloMuotoon(Math.floor(this.duration));
            document.getElementById('distance-info').innerText = "Aika: " + naytaAika + " | Matka: " + km + " km";
        }
    });

    // 7. APUFUNKTIOT
    function laskeGpsMatkat(reitti) {
        let summa = 0;
        for (let i = 0; i < reitti.length; i++) {
            if (i > 0) {
                let p1 = L.latLng(reitti[i-1].lat, reitti[i-1].lng);
                let p2 = L.latLng(reitti[i].lat, reitti[i].lng);
                summa += p1.distanceTo(p2);
            }
            reitti[i].kumulatiivinenMatka = summa;
        }
    }

    function kelloMuotoon(s) {
        let min = Math.floor(s / 60);
        let sek = s % 60;
        return min + ":" + (sek < 10 ? "0" : "") + sek;
    }

    // 8. GALLERIA
    function avaaGalleria(kuvat, indeksi) {
        nykyinenGalleria = kuvat; nykyinenIndeksi = indeksi;
        document.getElementById('image-panel').style.display = 'flex';
        paivitaGalleriaNakyma();
        document.addEventListener('keydown', kasitteleNappaimisto);
    }

    function paivitaGalleriaNakyma() {
        const k = nykyinenGalleria[nykyinenIndeksi];
        document.getElementById('full-image').src = "/media/" + k.path;
        document.getElementById('image-caption').innerText = k.name;
        document.getElementById('image-counter').innerText = (nykyinenIndeksi + 1) + " / " + nykyinenGalleria.length;
    }

    function vaihdaKuva(s) {
        nykyinenIndeksi = (nykyinenIndeksi + s + nykyinenGalleria.length) % nykyinenGalleria.length;
        paivitaGalleriaNakyma();
    }

    function suljeKuva() {
        document.getElementById('image-panel').style.display = 'none';
        document.removeEventListener('keydown', kasitteleNappaimisto);
    }

    function kasitteleNappaimisto(e) {
        if (e.key === "ArrowLeft") vaihdaKuva(-1);
        else if (e.key === "ArrowRight") vaihdaKuva(1);
        else if (e.key === "Escape") suljeKuva();
    }

    function toggleAllLayers(show) {
        Object.keys(groups).forEach(vuosi => {
            const r = groups[vuosi];
            if (show) {
                if (!map.hasLayer(r.videot)) map.addLayer(r.videot);
                if (!map.hasLayer(r.kuvat)) map.addLayer(r.kuvat);
            } else {
                if (map.hasLayer(r.videot)) map.removeLayer(r.videot);
                if (map.hasLayer(r.kuvat)) map.removeLayer(r.kuvat);
            }
        });
    }
</script>
</body>
</html>
